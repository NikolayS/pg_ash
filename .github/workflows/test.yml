name: Test pg_ash

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to least-privilege; this workflow only runs tests against a service
# container and needs no write access to repo contents, issues, or PRs.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [14, 15, 16, 17, 18]
        # Quoted so YAML doesn't coerce on/off into booleans — GitHub Actions
        # compares these as strings in the step-level `if`/conditionals.
        cron: ["on"]
        # Deliberate no-pg_cron variant (M-CI-4): exercise the degraded-mode
        # branch on a PG version where pg_cron is normally available (PG17),
        # so we catch regressions independent of PGDG package availability.
        include:
          - postgres: 17
            cron: "off"

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pg_cron in container
        # The GitHub Actions `services:` block does not let us mount a custom
        # postgresql.conf or set `command: -c shared_preload_libraries=...` on
        # the existing postgres service. So we `docker exec` into the already-
        # running service container to (1) apt-install pg_cron from PGDG and
        # (2) append `shared_preload_libraries` to postgresql.conf, then
        # `docker restart` so PostgreSQL re-reads the config. Without the
        # restart, pg_cron's background worker never starts.
        # When matrix.cron == 'off', we skip pg_cron install entirely to
        # exercise the degraded-mode (no-cron) branch.
        #
        # NB1/NB2: pass ${{ }} expressions through env: vars rather than
        # textual substitution into bash (CWE-78 hygiene; values are hard-
        # coded today but future edits shouldn't break the pattern).
        env:
          CRON: ${{ matrix.cron }}
          CONTAINER_ID: ${{ job.services.postgres.id }}
        run: |
          if [ "$CRON" = "off" ]; then
            echo "matrix.cron=off — skipping pg_cron install to test degraded mode"
            docker exec "$CONTAINER_ID" bash -c "
              echo \"shared_preload_libraries = 'pg_stat_statements'\" >> \${PGDATA}/postgresql.conf
            "
            docker restart "$CONTAINER_ID"
            sleep 5
            exit 0
          fi
          # Install pg_cron inside the PostgreSQL container (not on host).
          # Allow apt failures to be non-fatal here — PGDG sometimes lags on
          # new PG majors (e.g. PG18 right after release), and we want to
          # still exercise the no-cron branch rather than fail the whole job.
          # The follow-up "Verify pg_cron install matches expectation" step
          # enforces the expected state.
          docker exec "$CONTAINER_ID" bash -c "
            apt-get update && apt-get install -y postgresql-\${PG_MAJOR}-cron
          " || echo "pg_cron install failed — will fall back to no-cron mode"
          # Configure pg_cron (or fall back to pgss-only if install failed).
          # cron.use_background_workers = on makes pg_cron run each scheduled
          # command as a bgworker instead of opening a libpq connection to
          # localhost. That bypasses pg_hba.conf / TCP / username concerns
          # entirely, which has historically been the flakiest part of
          # running pg_cron in a CI service container. Supported since
          # pg_cron 1.5 (PGDG packages are always >= 1.6 now).
          docker exec "$CONTAINER_ID" bash -c "
            if [ -f /usr/share/postgresql/\${PG_MAJOR}/extension/pg_cron.control ]; then
              echo \"shared_preload_libraries = 'pg_cron,pg_stat_statements'\" >> \${PGDATA}/postgresql.conf
              echo 'cron.database_name = postgres' >> \${PGDATA}/postgresql.conf
              echo 'cron.use_background_workers = on' >> \${PGDATA}/postgresql.conf
            else
              echo \"shared_preload_libraries = 'pg_stat_statements'\" >> \${PGDATA}/postgresql.conf
            fi
          "
          docker restart "$CONTAINER_ID"
          sleep 5

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then break; fi
            sleep 1
          done

      - name: Create pg_cron extension
        env:
          PGPASSWORD: postgres
          CRON: ${{ matrix.cron }}
        run: |
          if [ "$CRON" = "off" ]; then
            echo "matrix.cron=off — not creating pg_cron extension"
          else
            # pg_cron may legitimately be unavailable on new PG majors before
            # PGDG catches up (e.g. PG18). Don't fail the job; downstream
            # cron-gated tests check `pg_extension` and skip themselves.
            psql -h localhost -U postgres -d postgres -c "create extension if not exists pg_cron;" || echo "pg_cron not available (PGDG package missing for this PG major)"
          fi
          # pg_stat_statements normally ships with every supported PG version,
          # but PGDG occasionally lags contrib on release day for a brand-new
          # major. NB4: treat pgss the same way we treat pg_cron — warn and
          # continue if creation fails — so a temporarily incomplete PGDG
          # doesn't turn every `cron=on` matrix entry red at setup. Downstream
          # pgss-dependent tests check `pg_extension` themselves and either
          # skip or assert their own error behaviour (see "Degraded mode:
          # without pg_stat_statements").
          psql -h localhost -U postgres -d postgres \
            -c "create extension if not exists pg_stat_statements;" \
            || echo "pg_stat_statements not available (contrib package missing for this PG major)"

      - name: "Verify pg_cron wiring"
        # Upstream-debugging step for H-CI-3: confirm that (a) the
        # shared_preload_libraries edit survived `docker restart`,
        # (b) cron.use_background_workers/cron.database_name took effect,
        # (c) the pg_cron scheduler bgworker actually attached. When
        # H-CI-3 has failed in the past (`baseline=0 after=0 waited=30`
        # with no rows in cron.job_run_details) these three facts were
        # all invisible — this step surfaces them in the job log every
        # run so a future failure pinpoints which link of the chain
        # broke.
        #
        # Non-fatal when matrix.cron=off or pg_cron isn't installed:
        # the degraded-mode axis deliberately has none of this.
        env:
          PGPASSWORD: postgres
          CRON: ${{ matrix.cron }}
        run: |
          if [ "$CRON" = "off" ]; then
            echo "matrix.cron=off — skipping pg_cron wiring verification"
            exit 0
          fi
          if ! psql -h localhost -U postgres -d postgres -tAc \
              "select exists (select from pg_extension where extname='pg_cron')" \
              | grep -q '^t$'; then
            echo "pg_cron extension not installed — skipping wiring verification"
            exit 0
          fi
          echo "=== GUCs ==="
          psql -h localhost -U postgres -d postgres -c "
            show shared_preload_libraries;
            show cron.database_name;
            show cron.use_background_workers;
            show cron.host;
          "
          echo "=== pg_cron extension version ==="
          psql -h localhost -U postgres -d postgres -c \
            "select extname, extversion from pg_extension where extname='pg_cron';"
          echo "=== pg_cron scheduler bgworker attached? ==="
          # When shared_preload_libraries actually loaded pg_cron, the
          # launcher bgworker is always running. If this returns 0 rows,
          # shared_preload_libraries did not include pg_cron at startup
          # (edit didn't survive / got overwritten / restart raced).
          psql -h localhost -U postgres -d postgres -c "
            select application_name, backend_type, state
            from pg_stat_activity
            where backend_type ~* 'cron'
               or application_name ~* 'cron';
          "
          echo "=== ash_* jobs currently scheduled in cron.job ==="
          # This separates "we scheduled jobs" (>0 rows) from "jobs are
          # running" (rows in cron.job_run_details). At this point in the
          # workflow no ash.start() has run yet, so this should be 0 — but
          # we emit the query now so the template is visible in the CI log
          # and later debugging can compare against the post-start state
          # captured in H-CI-3 itself.
          psql -h localhost -U postgres -d postgres -c "
            select count(*) as ash_jobs_scheduled
            from cron.job
            where jobname like 'ash_%';
          "

      - name: Install pg_ash (fresh install)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-install.sql

      - name: Test schema and infrastructure
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          do $$
          begin
            -- Schema exists
            assert exists (select from pg_namespace where nspname = 'ash'),
              'ash schema missing';

            -- Config table initialized with version
            assert (select count(*) from ash.config) = 1,
              'config not initialized';
            assert (select version from ash.config where singleton) = '1.4',
              'version should be 1.4 for fresh install';

            -- missed_samples column exists and defaults to 0
            assert exists (
              select from information_schema.columns
              where table_schema = 'ash' and table_name = 'config' and column_name = 'missed_samples'
            ), 'missed_samples column missing from ash.config';
            assert (select missed_samples from ash.config where singleton) = 0,
              'missed_samples should default to 0';

            -- Core tables exist
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'wait_event_map'),
              'wait_event_map missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample'),
              'sample missing';

            -- Partitioned query_map tables
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'query_map_0'),
              'query_map_0 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'query_map_1'),
              'query_map_1 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'query_map_2'),
              'query_map_2 missing';

            -- Sample partitions
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample_0'),
              'sample_0 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample_1'),
              'sample_1 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample_2'),
              'sample_2 missing';

            -- query_map_all view
            assert exists (select from pg_views where schemaname = 'ash' and viewname = 'query_map_all'),
              'query_map_all view missing';

            -- Core functions exist
            assert exists (select from pg_proc where proname = 'epoch' and pronamespace = 'ash'::regnamespace),
              'epoch() missing';
            assert exists (select from pg_proc where proname = 'current_slot' and pronamespace = 'ash'::regnamespace),
              'current_slot() missing';
            assert exists (select from pg_proc where proname = 'take_sample' and pronamespace = 'ash'::regnamespace),
              'take_sample() missing';
            assert exists (select from pg_proc where proname = 'rotate' and pronamespace = 'ash'::regnamespace),
              'rotate() missing';
            assert exists (select from pg_proc where proname = 'decode_sample' and pronamespace = 'ash'::regnamespace),
              'decode_sample() missing';
            assert exists (select from pg_proc where proname = '_wait_color' and pronamespace = 'ash'::regnamespace),
              '_wait_color() missing';

            raise notice 'Schema and infrastructure tests PASSED';
          end;
          $$;
          EOF

      - name: Test sampler and decoder
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          -- Test take_sample runs without error
          select ash.take_sample();

          -- Test decode_sample round-trip
          do $$
          declare
            v_wait_id smallint;
            v_qid_id int4;
            v_result record;
            v_count int;
          begin
            -- Insert test dictionary entries
            insert into ash.wait_event_map (state, type, event)
            values ('active', 'CPU*', 'CPU*') on conflict do nothing;
            insert into ash.wait_event_map (state, type, event)
            values ('active', 'IO', 'DataFileRead') on conflict do nothing;

            select id into v_wait_id from ash.wait_event_map
            where state = 'active' and type = 'CPU*' and event = 'CPU*';

            insert into ash.query_map_0 (query_id) values (12345) on conflict do nothing;
            select id into v_qid_id from ash.query_map_0 where query_id = 12345;

            -- Decode: 2 backends on CPU*, with query_ids
            select count(*) into v_count
            from ash.decode_sample(array[-v_wait_id, 2, v_qid_id, 0]::integer[]);
            assert v_count = 2, 'decode_sample wrong count: ' || v_count;

            -- Verify decoded fields: 2 backends = 2 rows
            select * into v_result
            from ash.decode_sample(array[-v_wait_id, 2, v_qid_id, 0]::integer[], 0::smallint)
            limit 1;
            assert v_result.wait_event = 'CPU*', 'wrong wait_event: ' || v_result.wait_event;
            assert v_result.query_id = 12345, 'wrong query_id: ' || v_result.query_id;

            raise notice 'Decoder tests PASSED';
          end;
          $$;
          EOF

      - name: Test missed_samples counter (timeout catching)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOFTEST'
          -- Reset counter
          update ash.config set missed_samples = 0 where singleton;

          -- 1. Verify missed_samples column exists and defaults to 0
          do $$
          begin
            assert exists (
              select from information_schema.columns
              where table_schema = 'ash' and table_name = 'config' and column_name = 'missed_samples'
            ), 'missed_samples column missing from ash.config';
            assert (select missed_samples from ash.config where singleton) = 0,
              'missed_samples should default to 0';
            raise notice 'TEST 1 PASSED: missed_samples column exists, defaults to 0';
          end;
          $$;

          -- 2. Verify take_sample works normally (returns >= 0, missed_samples stays 0)
          do $$
          declare
            v_result int;
          begin
            select ash.take_sample() into v_result;
            assert v_result >= 0, 'take_sample should return >= 0 without timeout, got: ' || v_result;
            assert (select missed_samples from ash.config where singleton) = 0,
              'missed_samples should be 0 after successful sample';
            raise notice 'TEST 2 PASSED: normal sampling works (returned %)', v_result;
          end;
          $$;

          -- 3. Simulate query_canceled via pg_cancel_backend to test the handler
          -- This is deterministic — no timing dependency on CI runner speed
          create or replace function test_simulate_cancel()
          returns int language plpgsql as $$
          begin
            -- Cancel our own backend; pg_sleep gives PG time to deliver the signal
            perform pg_cancel_backend(pg_backend_pid());
            perform pg_sleep(1);
            return 0;  -- never reached
          exception when query_canceled then
            update ash.config set missed_samples = missed_samples + 1 where singleton;
            return -1;
          end;
          $$;

          do $$
          declare
            v_result int;
            v_missed int;
          begin
            select test_simulate_cancel() into v_result;
            assert v_result = -1, 'simulated cancel should return -1, got: ' || v_result;

            select missed_samples into v_missed from ash.config where singleton;
            assert v_missed = 1, 'missed_samples should be 1 after simulated cancel, got: ' || v_missed;
            raise notice 'TEST 3 PASSED: cancel handler works (missed_samples = %)', v_missed;
          end;
          $$;

          drop function test_simulate_cancel();

          -- 4. Status should show missed_samples metric
          do $$
          declare
            v_val text;
          begin
            select value into v_val from ash.status() where metric = 'missed_samples';
            assert v_val is not null, 'status() should show missed_samples metric';
            assert v_val::int >= 1, 'missed_samples in status should be >= 1';
            raise notice 'TEST 4 PASSED: status() shows missed_samples (value = %)', v_val;
          end;
          $$;

          -- 5. Verify take_sample return value on idle DB is 0 (not -1)
          update ash.config set missed_samples = 0 where singleton;
          do $$
          declare
            v_result int;
          begin
            select ash.take_sample() into v_result;
            assert v_result = 0, 'take_sample on idle DB should return 0, got: ' || v_result;
            assert (select missed_samples from ash.config where singleton) = 0,
              'missed_samples should still be 0 (no timeout occurred)';
            raise notice 'TEST 5 PASSED: idle DB returns 0, missed_samples stays 0';
          end;
          $$;
          EOFTEST

          echo "Missed samples tests PASSED"

      - name: Test rotation
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          do $$
          declare
            v_slot_before smallint;
            v_slot_after smallint;
            v_target_slot smallint;
            v_count int;
            v_next_id int;
          begin
            select current_slot into v_slot_before from ash.config;

            -- Insert data into current partition
            insert into ash.sample (sample_ts, datid, active_count, data)
            values (1000, 1, 2, '{-1,2,1,1}');

            -- new_slot = (old + 1) % 3, truncate_slot = (new_slot + 1) % 3
            v_target_slot := ((v_slot_before + 1) % 3)::smallint;
            declare
              v_truncate_slot smallint := ((v_target_slot + 1) % 3)::smallint;
            begin
              -- Seed the partition that will be TRUNCATED
              execute format(
                'insert into ash.sample_%s (sample_ts, datid, active_count, data, slot) values (999, 1, 1, ''{-1,1,1}'', %s)',
                v_truncate_slot, v_truncate_slot
              );
              execute format(
                'insert into ash.query_map_%s (query_id) values (99999)',
                v_truncate_slot
              );

              -- Verify data exists before rotation
              execute format('select count(*) from ash.sample_%s', v_truncate_slot)
              into v_count;
              assert v_count > 0,
                'sample_' || v_truncate_slot || ' should have data before rotation';

              -- Force rotation
              update ash.config set rotated_at = now() - interval '2 days';
              perform ash.rotate();

              select current_slot into v_slot_after from ash.config;
              assert v_slot_after = v_target_slot,
                'slot should advance to ' || v_target_slot || ', got ' || v_slot_after;

              -- Verify TRUNCATION: truncated sample partition should be empty
              execute format('select count(*) from ash.sample_%s', v_truncate_slot)
              into v_count;
              assert v_count = 0,
                'sample_' || v_truncate_slot || ' should be empty after rotation, has ' || v_count || ' rows';

              -- Verify TRUNCATION: truncated query_map partition should be empty
              execute format('select count(*) from ash.query_map_%s', v_truncate_slot)
              into v_count;
              assert v_count = 0,
                'query_map_' || v_truncate_slot || ' should be empty after rotation, has ' || v_count || ' rows';

              -- Verify identity sequence was reset: next insert should get a low id
              execute format(
                'insert into ash.query_map_%s (query_id) values (88888) returning id',
                v_truncate_slot
              ) into v_next_id;
              assert v_next_id = 1,
                'query_map_' || v_truncate_slot || ' identity should restart at 1, got ' || v_next_id;
            end;

            raise notice 'Rotation tests PASSED (truncation + sequence reset verified)';
          end;
          $$;
          EOF

      - name: Test start/stop
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          select * from ash.start();
          select * from ash.stop();

          do $$
          begin
            assert exists (select from pg_proc where proname = 'start' and pronamespace = 'ash'::regnamespace);
            assert exists (select from pg_proc where proname = 'stop' and pronamespace = 'ash'::regnamespace);
            assert exists (select from pg_proc where proname = 'uninstall' and pronamespace = 'ash'::regnamespace);
            raise notice 'Start/stop tests PASSED';
          end;
          $$;
          EOF

      # End-to-end "pg_cron actually fires ash.take_sample on schedule"
      # (issue #37 H-CI-3) is deferred to issue #46. The in-DB logic
      # (ash.start / ash.take_sample / cron wiring) is still exercised by
      # direct take_sample() calls elsewhere in this workflow and by the
      # "Verify pg_cron wiring" step above. What's deferred is the
      # end-to-end "cron actually fires on schedule in CI" assertion,
      # which kept failing because pg_cron's scheduler metadata
      # connection hits `FATAL: database "root" does not exist` in the
      # GHA service container (peer auth defaults dbname to OS user
      # `root`). See https://github.com/NikolayS/pg_ash/issues/46 for
      # the iterations attempted and proposed next steps.

      - name: Test set_debug_logging
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          do $$
          declare
            v_result bool;
          begin
            -- Check initial state (should be false)
            select debug_logging into v_result from ash.config where singleton;
            assert v_result = false, 'debug_logging should default to false';

            -- Query current state via function
            perform ash.set_debug_logging();

            -- Enable
            perform ash.set_debug_logging(true);
            select debug_logging into v_result from ash.config where singleton;
            assert v_result = true, 'debug_logging should be true after enable';

            -- Disable
            perform ash.set_debug_logging(false);
            select debug_logging into v_result from ash.config where singleton;
            assert v_result = false, 'debug_logging should be false after disable';

            -- Status should show debug_logging
            assert exists (
              select 1 from ash.status() where metric = 'debug_logging'
            ), 'status should show debug_logging metric';

            raise notice 'set_debug_logging tests PASSED';
          end;
          $$;
          EOF

      - name: Test all interval formats (issue #2)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          do $$
          declare
            v_job_id bigint;
            v_schedule text;
            v_has_pgcron boolean;
          begin
            -- Skip cron schedule tests if pg_cron not available (e.g., PG18)
            select exists (select from pg_extension where extname = 'pg_cron') into v_has_pgcron;
            if not v_has_pgcron then
              -- Just verify start() works without pg_cron (no error)
              perform ash.start('1 second');
              perform ash.start('5 minutes');
              perform ash.start('2 hours');
              perform ash.stop();
              raise notice 'pg_cron not available — interval schedule tests skipped (pg_cron-optional path verified)';
              return;
            end if;

            perform ash.stop();

            -- Test 1-59 seconds range
            select job_id into v_job_id
            from ash.start('1 second')
            where job_type = 'sampler';
            assert v_job_id is not null, '1 second should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '1 seconds', '1 second should be 1 seconds, got: ' || v_schedule;
            perform ash.stop();

            select job_id into v_job_id
            from ash.start('59 seconds')
            where job_type = 'sampler';
            assert v_job_id is not null, '59 seconds should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '59 seconds', '59 seconds should be 59 seconds, got: ' || v_schedule;
            perform ash.stop();

            -- Test boundary: 60 seconds = 1 minute (cron format)
            select job_id into v_job_id
            from ash.start('60 seconds')
            where job_type = 'sampler';
            assert v_job_id is not null, '60 seconds should work as 1 minute';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '*/1 * * * *', '60 seconds should be */1 * * * *, got: ' || v_schedule;
            perform ash.stop();

            -- Test 1-59 minutes range
            select job_id into v_job_id
            from ash.start('1 minute')
            where job_type = 'sampler';
            assert v_job_id is not null, '1 minute should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '*/1 * * * *', '1 minute should be */1 * * * *, got: ' || v_schedule;
            perform ash.stop();

            select job_id into v_job_id
            from ash.start('5 minutes')
            where job_type = 'sampler';
            assert v_job_id is not null, '5 minutes should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '*/5 * * * *', '5 minutes should be */5 * * * *, got: ' || v_schedule;
            perform ash.stop();

            select job_id into v_job_id
            from ash.start('59 minutes')
            where job_type = 'sampler';
            assert v_job_id is not null, '59 minutes should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '*/59 * * * *', '59 minutes should be */59 * * * *, got: ' || v_schedule;
            perform ash.stop();

            -- Test boundary: 60 minutes = 1 hour (cron format)
            select job_id into v_job_id
            from ash.start('60 minutes')
            where job_type = 'sampler';
            assert v_job_id is not null, '60 minutes should work as 1 hour';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '0 * * * *', '60 minutes should be 0 * * * *, got: ' || v_schedule;
            perform ash.stop();

            -- Test 1+ hours range
            select job_id into v_job_id
            from ash.start('1 hour')
            where job_type = 'sampler';
            assert v_job_id is not null, '1 hour should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '0 * * * *', '1 hour should be 0 * * * *, got: ' || v_schedule;
            perform ash.stop();

            select job_id into v_job_id
            from ash.start('2 hours')
            where job_type = 'sampler';
            assert v_job_id is not null, '2 hours should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '0 */2 * * *', '2 hours should be 0 */2 * * *, got: ' || v_schedule;
            perform ash.stop();

            -- Test 23 hours (maximum allowed)
            select job_id into v_job_id
            from ash.start('23 hours')
            where job_type = 'sampler';
            assert v_job_id is not null, '23 hours should work';
            select schedule into v_schedule from cron.job where jobid = v_job_id;
            assert v_schedule = '0 */23 * * *', '23 hours should be 0 */23 * * *, got: ' || v_schedule;
            perform ash.stop();

            -- Test 24 hours should ERROR (exceeds 23h limit)
            declare
              v_error_msg text;
            begin
              select status into v_error_msg
              from ash.start('24 hours')
              where job_type = 'error';
              assert v_error_msg like '%23 hours%', '24 hours should error with 23 hours limit, got: ' || v_error_msg;
            end;

            -- Test error case: non-round interval
            declare
              v_error_msg text;
            begin
              select status into v_error_msg
              from ash.start('90 seconds')
              where job_type = 'error';
              assert v_error_msg like '%exact minutes%', '90 seconds should error, got: ' || v_error_msg;
            end;

            raise notice 'All interval format tests PASSED';
          end;
          $$;
          EOF

      - name: Seed test data
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          -- Reset to known state
          update ash.config set current_slot = 0;
          truncate ash.sample_0, ash.sample_1, ash.sample_2;
          truncate ash.query_map_0, ash.query_map_1, ash.query_map_2;
          alter table ash.query_map_0 alter column id restart;
          alter table ash.query_map_1 alter column id restart;
          alter table ash.query_map_2 alter column id restart;

          -- Seed dictionaries
          insert into ash.wait_event_map (state, type, event) values
            ('active', 'CPU*', 'CPU*'),
            ('active', 'IO', 'DataFileRead'),
            ('active', 'Lock', 'tuple'),
            ('active', 'LWLock', 'WALWrite'),
            ('active', 'Client', 'ClientRead'),
            ('active', 'Extension', 'DblinkGetResult'),
            ('idle in transaction', 'IdleTx', 'IdleTx')
          on conflict do nothing;

          insert into ash.query_map_0 (query_id) values (111111), (222222), (333333)
          on conflict do nothing;

          -- Seed realistic sample data across multiple timestamps
          -- Now - 30min, 20min, 10min, 5min, 1min — each with multiple wait events
          do $$
          declare
            v_cpu_id smallint;
            v_io_id smallint;
            v_lock_id smallint;
            v_lwlock_id smallint;
            v_client_id smallint;
            v_ext_id smallint;
            v_q1 int4;
            v_q2 int4;
            v_q3 int4;
            v_now_ts int4;
            v_ts int4;
          begin
            select id into v_cpu_id from ash.wait_event_map where type = 'CPU*' and event = 'CPU*';
            select id into v_io_id from ash.wait_event_map where type = 'IO' and event = 'DataFileRead';
            select id into v_lock_id from ash.wait_event_map where type = 'Lock' and event = 'tuple';
            select id into v_lwlock_id from ash.wait_event_map where type = 'LWLock' and event = 'WALWrite';
            select id into v_client_id from ash.wait_event_map where type = 'Client' and event = 'ClientRead';
            select id into v_ext_id from ash.wait_event_map where type = 'Extension' and event = 'DblinkGetResult';

            select id into v_q1 from ash.query_map_0 where query_id = 111111;
            select id into v_q2 from ash.query_map_0 where query_id = 222222;
            select id into v_q3 from ash.query_map_0 where query_id = 333333;

            v_now_ts := extract(epoch from now() - ash.epoch())::int4;

            -- Generate 60 samples across 30 minutes (every 30 seconds)
            for v_ts in
              select generate_series(v_now_ts - 1800, v_now_ts - 30, 30)
            loop
              -- Mix of CPU, IO, Lock — varies by position in timeline
              -- First half: mostly CPU + IO
              if v_ts < v_now_ts - 900 then
                insert into ash.sample (sample_ts, datid, active_count, data, slot)
                values (v_ts, 1, 5,
                  array[-v_cpu_id, 3, v_q1, v_q2, v_q3,
                        -v_io_id, 2, v_q1, v_q2]::integer[], 0);
              -- Second half: add Lock spike
              else
                insert into ash.sample (sample_ts, datid, active_count, data, slot)
                values (v_ts, 1, 8,
                  array[-v_cpu_id, 2, v_q1, v_q2,
                        -v_lock_id, 4, v_q1, v_q1, v_q2, v_q3,
                        -v_io_id, 1, v_q3,
                        -v_client_id, 1, v_q2]::integer[], 0);
              end if;
            end loop;

            raise notice 'Seeded 60 test samples across 30 minutes';
          end;
          $$;
          EOF

