      - name: "Dev workflow: re-apply migrations (idempotent)"
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          \i sql/ash-install.sql

          -- Apply all upgrade scripts on top of fresh install (should be idempotent)
          \i sql/ash-1.1-to-1.2.sql
          \i sql/ash-1.2-to-1.3.sql
          \i sql/ash-1.3-to-1.4.sql

          do $$
          begin
            assert (select version from ash.config where singleton) = '1.4',
              'version should still be 1.4';
            raise notice 'Idempotent re-apply PASSED';
          end;
          $$;

          -- Set missed_samples to a known value before re-apply
          update ash.config set missed_samples = 42 where singleton;

          -- Apply again — must preserve data
          \i sql/ash-1.1-to-1.2.sql
          \i sql/ash-1.2-to-1.3.sql
          \i sql/ash-1.3-to-1.4.sql

          do $$
          begin
            assert (select version from ash.config where singleton) = '1.4',
              'version should still be 1.4 after second apply';
            assert (select missed_samples from ash.config where singleton) = 42,
              'missed_samples should be preserved (42) after idempotent re-apply';
            -- timeline_chart must still be callable after re-apply. No data
            -- was seeded here, so count is not meaningful — a missing or
            -- broken function would raise.
            perform * from ash.timeline_chart('1 hour', '5 minutes', 3, 40);
            raise notice 'Second re-apply PASSED (missed_samples preserved)';
          end;
          $$;

          select ash.uninstall('yes');
          EOF

      - name: "Schema equivalence: fresh install vs full upgrade path"
        env:
          PGPASSWORD: postgres
        run: |
          cat > /tmp/ash_schema_snapshot.sql << 'SNAPSQL'
          \pset tuples_only on
          \pset format unaligned
          select 'FUNC', p.proname,
                 pg_get_function_identity_arguments(p.oid),
                 pg_get_function_result(p.oid),
                 md5(p.prosrc)
          from pg_proc p
          join pg_namespace n on n.oid = p.pronamespace
          where n.nspname = 'ash'
          order by p.proname, pg_get_function_identity_arguments(p.oid);

          select 'COL', c.relname, a.attname,
                 pg_catalog.format_type(a.atttypid, a.atttypmod),
                 a.attnotnull,
                 pg_get_expr(d.adbin, d.adrelid)
          from pg_class c
          join pg_namespace n on n.oid = c.relnamespace
          join pg_attribute a on a.attrelid = c.oid
          left join pg_attrdef d on d.adrelid = a.attrelid and d.adnum = a.attnum
          where n.nspname = 'ash' and c.relkind in ('r','p') and a.attnum > 0 and not a.attisdropped
          order by c.relname, a.attname;

          select 'IDX', c.relname, pg_get_indexdef(i.indexrelid)
          from pg_index i
          join pg_class c on c.oid = i.indexrelid
          join pg_namespace n on n.oid = c.relnamespace
          where n.nspname = 'ash'
          order by c.relname;

          select 'VIEW', viewname, md5(definition)
          from pg_views
          where schemaname = 'ash'
          order by viewname;
          SNAPSQL

          # 1) Fresh install → snapshot
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-install.sql > /dev/null 2>&1
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f /tmp/ash_schema_snapshot.sql > /tmp/fresh_schema.txt
          psql -h localhost -U postgres -d postgres -c "select ash.uninstall('yes')" > /dev/null 2>&1

          # 2) Full upgrade path → snapshot
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-1.0.sql > /dev/null 2>&1
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-1.1.sql > /dev/null 2>&1
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-1.1-to-1.2.sql > /dev/null 2>&1
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-1.2-to-1.3.sql > /dev/null 2>&1
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-1.3-to-1.4.sql > /dev/null 2>&1
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f /tmp/ash_schema_snapshot.sql > /tmp/upgraded_schema.txt
          psql -h localhost -U postgres -d postgres -c "select ash.uninstall('yes')" > /dev/null 2>&1

          # 3) Compare
          if diff -u /tmp/fresh_schema.txt /tmp/upgraded_schema.txt; then
            echo "Schema equivalence test PASSED: fresh install and upgrade path produce identical schemas"
          else
            echo "::error::Schema equivalence test FAILED: fresh install and upgrade path differ (see diff above)"
            exit 1
          fi

      - name: "Degraded mode: without pg_stat_statements"
        env:
          PGPASSWORD: postgres
        run: |
          # Drop pgss, reinstall pg_ash fresh (to test clean no-pgss state).
          # uninstall may fail if the schema was already dropped by a prior
          # step (e.g. "Upgrade path" ends with uninstall). That's expected,
          # so we silence it. But the install that follows MUST succeed.
          psql -h localhost -U postgres -d postgres -c "select ash.uninstall('yes')" 2>/dev/null || echo "ash.uninstall skipped (schema absent)"
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "drop extension if exists pg_stat_statements"
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-install.sql > /dev/null

          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'

          -- Seed minimal data for testing
          insert into ash.wait_event_map (state, type, event) values
            ('active', 'CPU*', 'CPU*') on conflict do nothing;
          insert into ash.query_map_0 (query_id) values (999999) on conflict do nothing;

          do $$
          declare
            v_count int;
            v_cpu_id smallint;
            v_q1 int4;
            v_now_ts int4;
          begin
            select id into v_cpu_id from ash.wait_event_map where type = 'CPU*';
            select id into v_q1 from ash.query_map_0 where query_id = 999999;
            v_now_ts := extract(epoch from now() - ash.epoch())::int4;
            insert into ash.sample (sample_ts, datid, active_count, data, slot)
            values (v_now_ts - 60, 1, 1, array[-v_cpu_id, 1, v_q1]::integer[], 0);

            -- Functions that should work (with null query_text):
            select count(*) into v_count from ash.top_waits('1 hour');
            assert v_count > 0, 'top_waits should work without pgss';

            select count(*) into v_count from ash.top_queries('1 hour');
            assert v_count > 0, 'top_queries should work without pgss (query_text = NULL, fires WARNING)';

            select count(*) into v_count from ash.top_by_type('1 hour');
            assert v_count > 0, 'top_by_type should work without pgss';

            select count(*) into v_count from ash.samples('1 hour');
            assert v_count > 0, 'samples should work without pgss (query_text = NULL, fires WARNING)';

            select count(*) into v_count from ash.activity_summary('1 hour');
            assert v_count > 0, 'activity_summary should work without pgss';

            -- timeline_chart always returns a legend row even with no data;
            -- with our seeded CPU* sample the count must exceed 1.
            select count(*) into v_count from ash.timeline_chart('1 hour', '5 minutes', 3, 40);
            assert v_count > 1,
              'timeline_chart without pgss should return legend + data rows, got: ' || v_count;

            perform ash.take_sample();
            perform ash.status();
            perform ash.set_debug_logging();

            -- Functions that should ERROR without pgss:
            begin
              perform ash.top_queries_with_text('1 hour');
              raise exception 'top_queries_with_text should have errored without pgss';
            exception when others then
              assert SQLERRM like '%pg_stat_statements%',
                'top_queries_with_text error should mention pg_stat_statements, got: ' || SQLERRM;
            end;

            begin
              perform ash.event_queries('CPU*', '1 hour');
              raise exception 'event_queries should have errored without pgss';
            exception when others then
              assert SQLERRM like '%pg_stat_statements%',
                'event_queries error should mention pg_stat_statements, got: ' || SQLERRM;
            end;

            begin
              perform ash.event_queries_at('CPU*', now() - interval '1 hour', now());
              raise exception 'event_queries_at should have errored without pgss';
            exception when others then
              assert SQLERRM like '%pg_stat_statements%',
                'event_queries_at error should mention pg_stat_statements, got: ' || SQLERRM;
            end;

            raise notice 'All degraded-mode (no pgss) tests PASSED';
          end;
          $$;
          EOF

          # Verify WARNING is emitted by pgss-optional functions (stderr check)
          echo "Verifying WARNING messages from pgss-optional functions..."

          for func in \
            "select * from ash.top_queries('1 hour')" \
            "select * from ash.top_queries_at(now() - interval '1 hour', now())" \
            "select * from ash.samples('1 hour')" \
            "select * from ash.samples_at(now() - interval '1 hour', now())" \
            "select * from ash.activity_summary('1 hour')"; do
            output=$(psql -h localhost -U postgres -d postgres -c "$func" 2>&1)
            if echo "$output" | grep -q "WARNING.*pg_stat_statements"; then
              echo "  ✓ $func — WARNING emitted"
            else
              echo "  ✗ $func — expected WARNING about pg_stat_statements"
              echo "  Output was: $output"
              exit 1
            fi
          done

          # Verify functions that should NOT warn (no pgss dependency)
          for func in \
            "select * from ash.top_waits('1 hour')" \
            "select * from ash.top_by_type('1 hour')"; do
            output=$(psql -h localhost -U postgres -d postgres -c "$func" 2>&1)
            if echo "$output" | grep -q "WARNING.*pg_stat_statements"; then
              echo "  ✗ $func — should NOT emit pgss WARNING"
              exit 1
            else
              echo "  ✓ $func — no WARNING (correct)"
            fi
          done

          echo "WARNING verification PASSED"

          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "select ash.uninstall('yes')"

          # Restore pgss for subsequent steps — must succeed.
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "create extension if not exists pg_stat_statements"

      - name: "Degraded mode: without pg_cron"
        env:
          PGPASSWORD: postgres
        run: |
          # Install pg_ash fresh without pg_cron.
          # `drop extension if exists` is a no-op when pg_cron isn't installed
          # (e.g. PG18 where PGDG package may be missing, or matrix.cron=off).
          # Use ON_ERROR_STOP so unrelated failures don't get silenced.
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "drop extension if exists pg_cron cascade"
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-install.sql > /dev/null

          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          do $$
          declare
            v_rec record;
            v_status_val text;
          begin
            -- start() should work without pg_cron (no error, prints hints)
            select status into v_status_val
            from ash.start('1 second')
            where job_type = 'sampler';
            assert v_status_val like '%schedule externally%',
              'start() without pg_cron should say schedule externally, got: ' || v_status_val;

            -- stop() should work without pg_cron
            select status into v_status_val
            from ash.stop()
            limit 1;
            assert v_status_val like '%external scheduler%',
              'stop() without pg_cron should mention external scheduler, got: ' || v_status_val;

            -- status() should show pg_cron_available = no
            select value into v_status_val
            from ash.status()
            where metric = 'pg_cron_available';
            assert v_status_val like '%no%',
              'status() should show pg_cron not available, got: ' || v_status_val;

            -- take_sample() should work without pg_cron
            perform ash.take_sample();

            -- All reader functions should work
            perform ash.top_waits('1 hour');
            perform ash.samples('1 hour');
            perform ash.timeline_chart('1 hour', '5 minutes', 3, 40);

            raise notice 'All degraded-mode (no pg_cron) tests PASSED';
          end;
          $$;

          select ash.uninstall('yes');
          EOF

      - name: Final summary
        env:
          PGPASSWORD: postgres
          PG_MAJOR: ${{ matrix.postgres }}
          CRON: ${{ matrix.cron }}
        run: |
          echo "All tests passed for PostgreSQL $PG_MAJOR (pg_cron=$CRON)"

