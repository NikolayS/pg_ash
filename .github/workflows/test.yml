              select from information_schema.columns
              where table_schema = 'ash' and table_name = 'config'
                and column_name = 'num_partitions'
            ), 'num_partitions column missing';

            assert exists (
              select from information_schema.columns
              where table_schema = 'ash' and table_name = 'config'
                and column_name = 'sampling_enabled'
            ), 'sampling_enabled column missing';

            assert exists (
              select from information_schema.columns
              where table_schema = 'ash' and table_name = 'config'
                and column_name = 'skipped_samples'
            ), 'skipped_samples column missing';

            -- === Default partition count ===
            select num_partitions into v_num from ash.config where singleton;
            assert v_num = 3, 'default num_partitions should be 3, got ' || v_num;

            -- === Check constraint on num_partitions ===
            begin
              update ash.config set num_partitions = 2 where singleton;
              assert false, 'should not allow num_partitions < 3';
            exception when check_violation then
              null; -- expected
            end;
            begin
              update ash.config set num_partitions = 33 where singleton;
              assert false, 'should not allow num_partitions > 32';
            exception when check_violation then
              null; -- expected
            end;

            -- === sampling_enabled flag controls take_sample ===
            update ash.config set sampling_enabled = false, skipped_samples = 0
            where singleton;
            perform ash.take_sample();
            assert (select skipped_samples from ash.config where singleton) = 1,
              'skipped_samples should increment when disabled';
            perform ash.take_sample();
            assert (select skipped_samples from ash.config where singleton) = 2,
              'skipped_samples should be 2 after second skip';
            update ash.config set sampling_enabled = true where singleton;

            -- === _active_slots uses num_partitions ===
            select ash._active_slots() into v_slots;
            select current_slot, num_partitions into v_slot, v_num
            from ash.config where singleton;
            assert v_slots[2] = ((v_slot - 1 + v_num) % v_num)::smallint,
              '_active_slots should use num_partitions for modulo';

            raise notice 'Configurable partitions tests PASSED';
          end;
          $$;
          EOF

