              'status should include rollup_1m_rows';
            assert 'rollup_1m_retention' = any(v_metrics),
              'status should include rollup_1m_retention';
            assert 'rollup_1h_rows' = any(v_metrics),
              'status should include rollup_1h_rows';
            assert 'rollup_1h_retention' = any(v_metrics),
              'status should include rollup_1h_retention';

            -- Original metrics still present
            assert 'version' = any(v_metrics),
              'status should include version';
            assert 'current_slot' = any(v_metrics),
              'status should include current_slot';

            raise notice 'Status output tests PASSED';
          end;
          $$;
          EOF

      - name: "Test v1.4: security (REVOKE on new functions)"
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          -- Create unprivileged user
          do $$
          begin
            if not exists (select from pg_roles where rolname = 'ash_test_user') then
              create role ash_test_user login;
            end if;
          end $$;

          grant usage on schema ash to ash_test_user;
          grant select on all tables in schema ash to ash_test_user;

          -- Test that admin functions are revoked from public
          set role ash_test_user;

          do $$
          begin
            -- rebuild_partitions should be denied
            begin
              perform ash.rebuild_partitions(3);
              assert false, 'rebuild_partitions should be denied for unprivileged user';
            exception when insufficient_privilege then
              null; -- expected
            end;

            -- rollup_minute should be denied
            begin
              perform ash.rollup_minute();
              assert false, 'rollup_minute should be denied for unprivileged user';
            exception when insufficient_privilege then
              null; -- expected
            end;

            -- But ts helpers should be accessible (PUBLIC)
            perform ash.ts_from_timestamptz(now());
            perform ash.ts_to_timestamptz(0);
          end;
          $$;

          -- Readers are REVOKEd from PUBLIC by #45's hardening; grant
          -- explicitly to the test role before exercising the reader path.
          reset role;
          grant execute on function ash.minute_waits(interval, int) to ash_test_user;
          grant execute on function ash.minute_waits_at(timestamptz, timestamptz, int) to ash_test_user;
          set role ash_test_user;

          do $$
          begin
            -- Reader functions should be accessible after explicit grant
            perform (select count(*) from ash.minute_waits('1 hour', 1));

            raise notice 'Security tests PASSED';
          end;
          $$;

          reset role;
          revoke execute on function ash.minute_waits(interval, int) from ash_test_user;
          revoke execute on function ash.minute_waits_at(timestamptz, timestamptz, int) from ash_test_user;
          revoke all on schema ash from ash_test_user;
          revoke all on all tables in schema ash from ash_test_user;
          drop role ash_test_user;
          EOF

      - name: "Test v1.4: rollup_cleanup retention"
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          do $$
          declare
            v_old_ts int4;
            v_recent_ts int4;
            v_count int;
            v_result text;
          begin
            -- Insert old data (40 days ago) and recent data (1 day ago)
            v_old_ts := ash.ts_from_timestamptz(now() - interval '40 days');
            v_recent_ts := ash.ts_from_timestamptz(now() - interval '1 day');

            insert into ash.rollup_1m (ts, datid, samples, peak_backends, wait_counts, query_counts)
            values
              (v_old_ts, 0::oid, 10, 2, '{}'::int4[], '{}'::int8[]),
              (v_recent_ts, 0::oid, 10, 2, '{}'::int4[], '{}'::int8[])
            on conflict (ts, datid) do nothing;

            -- Run cleanup with default 30-day retention
            select ash.rollup_cleanup() into v_result;
            assert v_result like 'cleanup:%', 'cleanup should return message';

            -- Old row should be deleted
            select count(*) into v_count from ash.rollup_1m where ts = v_old_ts;
            assert v_count = 0,
              'old rollup_1m row (40 days) should be deleted, got ' || v_count;

            -- Recent row should survive
            select count(*) into v_count from ash.rollup_1m where ts = v_recent_ts;
            assert v_count = 1,
              'recent rollup_1m row (1 day) should survive, got ' || v_count;

            raise notice 'rollup_cleanup retention tests PASSED';
          end;
          $$;

          -- Test CHECK constraint prevents negative retention
          do $$
          begin
            begin
              update ash.config set rollup_1m_retention_days = 0 where singleton;
              assert false, 'should not allow retention_days = 0';
            exception when check_violation then
              null; -- expected
            end;

            begin
              update ash.config set rollup_1h_retention_days = -1 where singleton;
              assert false, 'should not allow negative retention_days';
            exception when check_violation then
              null; -- expected
            end;

            raise notice 'Retention CHECK constraint tests PASSED';
          end;
          $$;
          EOF

      - name: "Test v1.4: advisory lock visibility"
        env:
