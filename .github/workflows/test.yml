name: Test pg_ash

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to least-privilege; this workflow only runs tests against a service
# container and needs no write access to repo contents, issues, or PRs.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [14, 15, 16, 17, 18]
        # Quoted so YAML doesn't coerce on/off into booleans — GitHub Actions
        # compares these as strings in the step-level `if`/conditionals.
        cron: ["on"]
        # Deliberate no-pg_cron variant (M-CI-4): exercise the degraded-mode
        # branch on a PG version where pg_cron is normally available (PG17),
        # so we catch regressions independent of PGDG package availability.
        include:
          - postgres: 17
            cron: "off"

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pg_cron in container
        # The GitHub Actions `services:` block does not let us mount a custom
        # postgresql.conf or set `command: -c shared_preload_libraries=...` on
        # the existing postgres service. So we `docker exec` into the already-
        # running service container to (1) apt-install pg_cron from PGDG and
        # (2) append `shared_preload_libraries` to postgresql.conf, then
        # `docker restart` so PostgreSQL re-reads the config. Without the
        # restart, pg_cron's background worker never starts.
        # When matrix.cron == 'off', we skip pg_cron install entirely to
        # exercise the degraded-mode (no-cron) branch.
        #
        # NB1/NB2: pass ${{ }} expressions through env: vars rather than
        # textual substitution into bash (CWE-78 hygiene; values are hard-
        # coded today but future edits shouldn't break the pattern).
        env:
          CRON: ${{ matrix.cron }}
          CONTAINER_ID: ${{ job.services.postgres.id }}
        run: |
          if [ "$CRON" = "off" ]; then
            echo "matrix.cron=off — skipping pg_cron install to test degraded mode"
            docker exec "$CONTAINER_ID" bash -c "
              echo \"shared_preload_libraries = 'pg_stat_statements'\" >> \${PGDATA}/postgresql.conf
            "
            docker restart "$CONTAINER_ID"
            sleep 5
            exit 0
          fi
          # Install pg_cron inside the PostgreSQL container (not on host).
          # Allow apt failures to be non-fatal here — PGDG sometimes lags on
          # new PG majors (e.g. PG18 right after release), and we want to
          # still exercise the no-cron branch rather than fail the whole job.
          # The follow-up "Verify pg_cron install matches expectation" step
          # enforces the expected state.
          docker exec "$CONTAINER_ID" bash -c "
            apt-get update && apt-get install -y postgresql-\${PG_MAJOR}-cron
          " || echo "pg_cron install failed — will fall back to no-cron mode"
          # Configure pg_cron (or fall back to pgss-only if install failed).
          # cron.use_background_workers = on makes pg_cron run each scheduled
          # command as a bgworker instead of opening a libpq connection to
          # localhost. That bypasses pg_hba.conf / TCP / username concerns
          # entirely, which has historically been the flakiest part of
          # running pg_cron in a CI service container. Supported since
          # pg_cron 1.5 (PGDG packages are always >= 1.6 now).
          docker exec "$CONTAINER_ID" bash -c "
            if [ -f /usr/share/postgresql/\${PG_MAJOR}/extension/pg_cron.control ]; then
              echo \"shared_preload_libraries = 'pg_cron,pg_stat_statements'\" >> \${PGDATA}/postgresql.conf
              echo 'cron.database_name = postgres' >> \${PGDATA}/postgresql.conf
              echo 'cron.use_background_workers = on' >> \${PGDATA}/postgresql.conf
            else
              echo \"shared_preload_libraries = 'pg_stat_statements'\" >> \${PGDATA}/postgresql.conf
            fi
          "
          docker restart "$CONTAINER_ID"
          sleep 5

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then break; fi
            sleep 1
          done

      - name: Create pg_cron extension
        env:
          PGPASSWORD: postgres
          CRON: ${{ matrix.cron }}
        run: |
          if [ "$CRON" = "off" ]; then
            echo "matrix.cron=off — not creating pg_cron extension"
          else
            # pg_cron may legitimately be unavailable on new PG majors before
            # PGDG catches up (e.g. PG18). Don't fail the job; downstream
            # cron-gated tests check `pg_extension` and skip themselves.
            psql -h localhost -U postgres -d postgres -c "create extension if not exists pg_cron;" || echo "pg_cron not available (PGDG package missing for this PG major)"
          fi
          # pg_stat_statements normally ships with every supported PG version,
          # but PGDG occasionally lags contrib on release day for a brand-new
          # major. NB4: treat pgss the same way we treat pg_cron — warn and
          # continue if creation fails — so a temporarily incomplete PGDG
          # doesn't turn every `cron=on` matrix entry red at setup. Downstream
          # pgss-dependent tests check `pg_extension` themselves and either
          # skip or assert their own error behaviour (see "Degraded mode:
          # without pg_stat_statements").
          psql -h localhost -U postgres -d postgres \
            -c "create extension if not exists pg_stat_statements;" \
            || echo "pg_stat_statements not available (contrib package missing for this PG major)"

      - name: "Verify pg_cron wiring"
        # Upstream-debugging step for H-CI-3: confirm that (a) the
        # shared_preload_libraries edit survived `docker restart`,
        # (b) cron.use_background_workers/cron.database_name took effect,
        # (c) the pg_cron scheduler bgworker actually attached. When
        # H-CI-3 has failed in the past (`baseline=0 after=0 waited=30`
        # with no rows in cron.job_run_details) these three facts were
        # all invisible — this step surfaces them in the job log every
        # run so a future failure pinpoints which link of the chain
        # broke.
        #
        # Non-fatal when matrix.cron=off or pg_cron isn't installed:
        # the degraded-mode axis deliberately has none of this.
        env:
          PGPASSWORD: postgres
          CRON: ${{ matrix.cron }}
        run: |
          if [ "$CRON" = "off" ]; then
            echo "matrix.cron=off — skipping pg_cron wiring verification"
            exit 0
          fi
          if ! psql -h localhost -U postgres -d postgres -tAc \
              "select exists (select from pg_extension where extname='pg_cron')" \
              | grep -q '^t$'; then
            echo "pg_cron extension not installed — skipping wiring verification"
            exit 0
          fi
          echo "=== GUCs ==="
          psql -h localhost -U postgres -d postgres -c "
            show shared_preload_libraries;
            show cron.database_name;
            show cron.use_background_workers;
            show cron.host;
          "
          echo "=== pg_cron extension version ==="
          psql -h localhost -U postgres -d postgres -c \
            "select extname, extversion from pg_extension where extname='pg_cron';"
          echo "=== pg_cron scheduler bgworker attached? ==="
          # When shared_preload_libraries actually loaded pg_cron, the
          # launcher bgworker is always running. If this returns 0 rows,
          # shared_preload_libraries did not include pg_cron at startup
          # (edit didn't survive / got overwritten / restart raced).
          psql -h localhost -U postgres -d postgres -c "
            select application_name, backend_type, state
            from pg_stat_activity
            where backend_type ~* 'cron'
               or application_name ~* 'cron';
          "
          echo "=== ash_* jobs currently scheduled in cron.job ==="
          # This separates "we scheduled jobs" (>0 rows) from "jobs are
          # running" (rows in cron.job_run_details). At this point in the
          # workflow no ash.start() has run yet, so this should be 0 — but
          # we emit the query now so the template is visible in the CI log
          # and later debugging can compare against the post-start state
          # captured in H-CI-3 itself.
          psql -h localhost -U postgres -d postgres -c "
            select count(*) as ash_jobs_scheduled
            from cron.job
            where jobname like 'ash_%';
          "

      - name: Install pg_ash (fresh install)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f sql/ash-install.sql

      - name: Test schema and infrastructure
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          do $$
          begin
            -- Schema exists
            assert exists (select from pg_namespace where nspname = 'ash'),
              'ash schema missing';

            -- Config table initialized with version
            assert (select count(*) from ash.config) = 1,
              'config not initialized';
            assert (select version from ash.config where singleton) = '1.4',
              'version should be 1.4 for fresh install';

            -- missed_samples column exists and defaults to 0
            assert exists (
              select from information_schema.columns
              where table_schema = 'ash' and table_name = 'config' and column_name = 'missed_samples'
            ), 'missed_samples column missing from ash.config';
            assert (select missed_samples from ash.config where singleton) = 0,
              'missed_samples should default to 0';

            -- Core tables exist
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'wait_event_map'),
              'wait_event_map missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample'),
              'sample missing';

            -- Partitioned query_map tables
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'query_map_0'),
              'query_map_0 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'query_map_1'),
              'query_map_1 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'query_map_2'),
              'query_map_2 missing';

            -- Sample partitions
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample_0'),
              'sample_0 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample_1'),
              'sample_1 missing';
            assert exists (select from pg_tables where schemaname = 'ash' and tablename = 'sample_2'),
              'sample_2 missing';

            -- query_map_all view
            assert exists (select from pg_views where schemaname = 'ash' and viewname = 'query_map_all'),
              'query_map_all view missing';

            -- Core functions exist
            assert exists (select from pg_proc where proname = 'epoch' and pronamespace = 'ash'::regnamespace),
              'epoch() missing';
            assert exists (select from pg_proc where proname = 'current_slot' and pronamespace = 'ash'::regnamespace),
              'current_slot() missing';
            assert exists (select from pg_proc where proname = 'take_sample' and pronamespace = 'ash'::regnamespace),
              'take_sample() missing';
            assert exists (select from pg_proc where proname = 'rotate' and pronamespace = 'ash'::regnamespace),
              'rotate() missing';
            assert exists (select from pg_proc where proname = 'decode_sample' and pronamespace = 'ash'::regnamespace),
              'decode_sample() missing';
            assert exists (select from pg_proc where proname = '_wait_color' and pronamespace = 'ash'::regnamespace),
              '_wait_color() missing';

            raise notice 'Schema and infrastructure tests PASSED';
          end;
          $$;
          EOF

      - name: Test privilege hardening (REVOKE from PUBLIC)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          -- Create an unprivileged role to represent a "random tenant"
          do $$
          begin
            if not exists (select from pg_roles where rolname = 'ash_test_unpriv') then
              create role ash_test_unpriv login password 'x';
            end if;
          end $$;

          do $$
          begin
            -- PUBLIC has no EXECUTE on reader functions
            assert not has_function_privilege('public', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.top_waits';
            assert not has_function_privilege('public', 'ash.top_queries(interval,int)', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.top_queries';
            assert not has_function_privilege('public', 'ash.status()', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.status';
            assert not has_function_privilege('public', 'ash.samples(interval,int)', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.samples';

            -- PUBLIC has no EXECUTE on admin functions
            assert not has_function_privilege('public', 'ash.start(interval)', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.start';
            assert not has_function_privilege('public', 'ash.stop()', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.stop';
            assert not has_function_privilege('public', 'ash.rotate()', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.rotate';
            assert not has_function_privilege('public', 'ash.take_sample()', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.take_sample';
            assert not has_function_privilege('public', 'ash.set_debug_logging(bool)', 'EXECUTE'),
              'PUBLIC should NOT have EXECUTE on ash.set_debug_logging';

            -- PUBLIC has no SELECT on reader tables
            assert not has_table_privilege('public', 'ash.sample', 'SELECT'),
              'PUBLIC should NOT have SELECT on ash.sample';
            assert not has_table_privilege('public', 'ash.config', 'SELECT'),
              'PUBLIC should NOT have SELECT on ash.config';
            assert not has_table_privilege('public', 'ash.wait_event_map', 'SELECT'),
              'PUBLIC should NOT have SELECT on ash.wait_event_map';
            assert not has_table_privilege('public', 'ash.query_map_all', 'SELECT'),
              'PUBLIC should NOT have SELECT on ash.query_map_all';
            assert not has_table_privilege('public', 'ash.sample_0', 'SELECT'),
              'PUBLIC should NOT have SELECT on ash.sample_0';
            assert not has_table_privilege('public', 'ash.query_map_0', 'SELECT'),
              'PUBLIC should NOT have SELECT on ash.query_map_0';

            -- Unprivileged role (non-owner) cannot execute readers either
            assert not has_function_privilege('ash_test_unpriv', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'non-owner role should NOT have EXECUTE on ash.top_waits';
            assert not has_function_privilege('ash_test_unpriv', 'ash.top_queries(interval,int)', 'EXECUTE'),
              'non-owner role should NOT have EXECUTE on ash.top_queries';

            -- Owner (postgres) retains EXECUTE by virtue of ownership
            assert has_function_privilege('postgres', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'owner SHOULD have EXECUTE on ash.top_waits';
            assert has_function_privilege('postgres', 'ash.start(interval)', 'EXECUTE'),
              'owner SHOULD have EXECUTE on ash.start';
            assert has_function_privilege('postgres', 'ash.take_sample()', 'EXECUTE'),
              'owner SHOULD have EXECUTE on ash.take_sample';
            assert has_table_privilege('postgres', 'ash.sample', 'SELECT'),
              'owner SHOULD have SELECT on ash.sample';

            raise notice 'Privilege hardening tests PASSED';
          end;
          $$;

          -- Behavioral check: call as the unprivileged role, expect 42501
          set role ash_test_unpriv;
          do $$
          begin
            begin
              perform ash.top_waits('1 hour'::interval, 10, 0);
              raise exception 'expected permission denied, but call succeeded';
            exception when insufficient_privilege then
              -- expected path
              null;
            end;
          end;
          $$;
          reset role;

          -- GRANT flow smoke-test: owner can hand out EXECUTE, then REVOKE it
          grant execute on function ash.top_waits(interval, int, int, boolean) to ash_test_unpriv;
          do $$
          begin
            assert has_function_privilege('ash_test_unpriv', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'GRANT to non-owner role should succeed';
          end $$;
          revoke execute on function ash.top_waits(interval, int, int, boolean) from ash_test_unpriv;
          do $$
          begin
            assert not has_function_privilege('ash_test_unpriv', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'REVOKE from non-owner role should succeed';
          end $$;

          drop role ash_test_unpriv;
          EOF

      - name: Test ash.grant_reader / ash.revoke_reader helpers (#52)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 << 'EOF'
          -- Set up: a monitoring-style role with no privileges yet.
          do $$
          begin
            if not exists (select from pg_roles where rolname = 'ash_grafana') then
              create role ash_grafana login password 'x';
            end if;
          end $$;

          -- Sanity: role cannot use schema ash before grant_reader.
          do $$
          begin
            assert not has_schema_privilege('ash_grafana', 'ash', 'USAGE'),
              'ash_grafana must NOT have USAGE on ash before grant_reader';
            assert not has_function_privilege('ash_grafana', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'ash_grafana must NOT have EXECUTE on ash.top_waits before grant_reader';
            assert not has_function_privilege('ash_grafana', 'ash.status()', 'EXECUTE'),
              'ash_grafana must NOT have EXECUTE on ash.status before grant_reader';
            assert not has_function_privilege('ash_grafana', 'ash.minute_waits(interval,int)', 'EXECUTE'),
              'ash_grafana must NOT have EXECUTE on ash.minute_waits before grant_reader';
            assert not has_table_privilege('ash_grafana', 'ash.sample', 'SELECT'),
              'ash_grafana must NOT have SELECT on ash.sample before grant_reader';
            assert not has_table_privilege('ash_grafana', 'ash.rollup_1m', 'SELECT'),
              'ash_grafana must NOT have SELECT on ash.rollup_1m before grant_reader';
            assert not has_table_privilege('ash_grafana', 'ash.sample_0', 'SELECT'),
              'ash_grafana must NOT have SELECT on ash.sample_0 before grant_reader';
          end $$;

          -- Validation: non-existent role must raise a clear error and not partial-grant.
          do $$
          declare
            v_succeeded bool := false;
          begin
            begin
              perform ash.grant_reader('nope_does_not_exist');
              v_succeeded := true;
            exception when raise_exception then
              null; -- expected: function raised because role missing
            end;
            assert not v_succeeded,
              'grant_reader must reject non-existent role';
          end $$;

          -- GRANT: hand out the reader bundle.
          select ash.grant_reader('ash_grafana');

          -- Verify the granted set.
          do $$
          begin
            assert has_schema_privilege('ash_grafana', 'ash', 'USAGE'),
              'grant_reader: ash_grafana must have USAGE on ash';

            -- Reader functions across the family
            assert has_function_privilege('ash_grafana', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'grant_reader: ash.top_waits must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.top_queries(interval,int)', 'EXECUTE'),
              'grant_reader: ash.top_queries must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.status()', 'EXECUTE'),
              'grant_reader: ash.status must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.samples(interval,int)', 'EXECUTE'),
              'grant_reader: ash.samples must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.minute_waits(interval,int)', 'EXECUTE'),
              'grant_reader: ash.minute_waits must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.hourly_queries(interval,int)', 'EXECUTE'),
              'grant_reader: ash.hourly_queries must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.daily_peak_backends(interval)', 'EXECUTE'),
              'grant_reader: ash.daily_peak_backends must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.activity_summary(interval)', 'EXECUTE'),
              'grant_reader: ash.activity_summary must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.timeline_chart(interval,interval,int,int,boolean)', 'EXECUTE'),
              'grant_reader: ash.timeline_chart must be EXECUTE-able';

            -- Reader-helpers the readers depend on
            assert has_function_privilege('ash_grafana', 'ash._active_slots()', 'EXECUTE'),
              'grant_reader: ash._active_slots must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash._wait_color(text,boolean)', 'EXECUTE'),
              'grant_reader: ash._wait_color must be EXECUTE-able';
            assert has_function_privilege('ash_grafana', 'ash.epoch()', 'EXECUTE'),
              'grant_reader: ash.epoch must be EXECUTE-able';

            -- Admin functions stay locked down
            assert not has_function_privilege('ash_grafana', 'ash.start(interval)', 'EXECUTE'),
              'grant_reader: ash.start must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.stop()', 'EXECUTE'),
              'grant_reader: ash.stop must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.take_sample()', 'EXECUTE'),
              'grant_reader: ash.take_sample must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.rotate()', 'EXECUTE'),
              'grant_reader: ash.rotate must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.uninstall(text)', 'EXECUTE'),
              'grant_reader: ash.uninstall must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.set_debug_logging(bool)', 'EXECUTE'),
              'grant_reader: ash.set_debug_logging must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.rollup_minute(int)', 'EXECUTE'),
              'grant_reader: ash.rollup_minute must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.rollup_hour()', 'EXECUTE'),
              'grant_reader: ash.rollup_hour must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.rollup_cleanup()', 'EXECUTE'),
              'grant_reader: ash.rollup_cleanup must remain admin-only';
            -- The helpers themselves are admin-only too: a reader role
            -- that could grant_reader/revoke_reader could escalate.
            assert not has_function_privilege('ash_grafana', 'ash.grant_reader(name)', 'EXECUTE'),
              'grant_reader: ash.grant_reader must remain admin-only';
            assert not has_function_privilege('ash_grafana', 'ash.revoke_reader(name)', 'EXECUTE'),
              'grant_reader: ash.revoke_reader must remain admin-only';

            -- Reader tables
            assert has_table_privilege('ash_grafana', 'ash.sample', 'SELECT'),
              'grant_reader: SELECT on ash.sample';
            assert has_table_privilege('ash_grafana', 'ash.query_map_all', 'SELECT'),
              'grant_reader: SELECT on ash.query_map_all';
            assert has_table_privilege('ash_grafana', 'ash.config', 'SELECT'),
              'grant_reader: SELECT on ash.config';
            assert has_table_privilege('ash_grafana', 'ash.wait_event_map', 'SELECT'),
              'grant_reader: SELECT on ash.wait_event_map';
            assert has_table_privilege('ash_grafana', 'ash.rollup_1m', 'SELECT'),
              'grant_reader: SELECT on ash.rollup_1m';
            assert has_table_privilege('ash_grafana', 'ash.rollup_1h', 'SELECT'),
              'grant_reader: SELECT on ash.rollup_1h';

            -- Per-slot partitions get SELECT (parent grants do not cascade in PG)
            assert has_table_privilege('ash_grafana', 'ash.sample_0', 'SELECT'),
              'grant_reader: SELECT on ash.sample_0 (partition)';
            assert has_table_privilege('ash_grafana', 'ash.query_map_0', 'SELECT'),
              'grant_reader: SELECT on ash.query_map_0 (dictionary)';

            raise notice 'grant_reader granted set verified';
          end $$;

          -- Idempotency: second grant_reader is a no-op error-free.
          select ash.grant_reader('ash_grafana');

          -- Behavioral check: actually call a reader as the role.
          -- Avoid ash.status() here: it reads cron.job when pg_cron is
          -- loaded, which requires USAGE on schema cron — out of scope
          -- for grant_reader (and a separate, pre-existing limitation).
          set role ash_grafana;
          select count(*) from ash.top_waits('1 hour'::interval, 5, 0);
          select count(*) from ash.minute_waits('1 hour'::interval, 5);
          -- direct table read works too
          do $$ begin perform 1 from ash.sample limit 1; end $$;
          reset role;

          -- REVOKE: take everything back.
          select ash.revoke_reader('ash_grafana');

          do $$
          begin
            assert not has_schema_privilege('ash_grafana', 'ash', 'USAGE'),
              'revoke_reader: USAGE on ash must be revoked';
            assert not has_function_privilege('ash_grafana', 'ash.top_waits(interval,int,int,boolean)', 'EXECUTE'),
              'revoke_reader: EXECUTE on ash.top_waits must be revoked';
            assert not has_function_privilege('ash_grafana', 'ash.status()', 'EXECUTE'),
              'revoke_reader: EXECUTE on ash.status must be revoked';
            assert not has_function_privilege('ash_grafana', 'ash.minute_waits(interval,int)', 'EXECUTE'),
              'revoke_reader: EXECUTE on ash.minute_waits must be revoked';
            assert not has_table_privilege('ash_grafana', 'ash.sample', 'SELECT'),
              'revoke_reader: SELECT on ash.sample must be revoked';
            assert not has_table_privilege('ash_grafana', 'ash.rollup_1m', 'SELECT'),
              'revoke_reader: SELECT on ash.rollup_1m must be revoked';
            assert not has_table_privilege('ash_grafana', 'ash.sample_0', 'SELECT'),
              'revoke_reader: SELECT on ash.sample_0 must be revoked';

            raise notice 'revoke_reader fully removed reader privileges';
          end $$;

          -- After revoke, calling a reader as the role must fail with 42501.
          set role ash_grafana;
          do $$
          declare
            v_succeeded bool := false;
          begin
            begin
              perform ash.top_waits('1 hour'::interval, 5, 0);
              v_succeeded := true;
            exception when insufficient_privilege then
              null; -- expected: 42501 permission denied
            end;
            assert not v_succeeded,
              'expected permission denied after revoke_reader, got success';
          end $$;
          reset role;

          -- Idempotency: second revoke_reader is a no-op.
          select ash.revoke_reader('ash_grafana');

          drop role ash_grafana;
          EOF

